name: Unzip Project

on:
  push:
    paths:
      - '**.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip any zip file found in repo root
        run: |
          for f in *.zip; do
            [ -e "$f" ] || continue
            echo "Extracting $f"
            unzip -o "$f" -d .
            # If the zip contained a single top-level folder, move its contents up
            TOPDIR=$(unzip -Z1 "$f" | head -1 | cut -d/ -f1)
            if [ -d "$TOPDIR" ]; then
              cp -rf "$TOPDIR"/. .
              rm -rf "$TOPDIR"
            fi
            rm -f "$f"
          done

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-extract uploaded zip"
          git push
